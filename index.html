function getTheme(){
  var h=new Date().getHours();
  var nowMin=h*60+new Date().getMinutes()+new Date().getSeconds()/60;
  try{
    if(S&&S.route&&S.route.arrivalTimes&&S.route.arrivalTimes.length){
      var first=pt(S.route.arrivalTimes[0]);
      var last=pt(S.route.arrivalTimes[S.route.arrivalTimes.length-1]);
      if(nowMin<first-30||nowMin>last+10)return"night";
    }
  }catch(x){}
  if(h>=5&&h<8)return"dawn";
  if(h>=8&&h<17)return"day";
  if(h>=17&&h<19)return"dusk";
  if(h>=19&&h<22)return"evening";
  return"night";
}

function getDayType(){
  var d=new Date().getDay();
  return(d===0||d===6)?"holiday":"weekday";
}

function gn(){var n=new Date();return n.getHours()*60+n.getMinutes()+n.getSeconds()/60;}
S.now=gn();
function e(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function pt(s){if(!s)return 0;var p=s.split(":");return+p[0]*60+(+p[1])+(p[2]?+p[2]/60:0);}
function ft(m){
  var total=Math.round(m);
  var h=Math.floor(total/60)%24;
  var n=total%60;
  return(h<10?"0":"")+h+":"+(n<10?"0":"")+n;
}

function csv(t){
  if(!t)return[];
  var ls=t.trim().split("\n");if(ls.length<2)return[];
  var hd=ls[0].replace(/\r/g,"").split(",").map(function(h){return h.trim().replace(/^"|"$/g,"");});
  return ls.slice(1).filter(function(l){return l.trim();}).map(function(l){
    var v=[],c="",q=false,ch=l.replace(/\r/g,"").split("");
    for(var i=0;i<ch.length;i++){if(ch[i]==='"'){q=!q;}else if(ch[i]===","&&!q){v.push(c.trim());c="";}else{c+=ch[i];}}
    v.push(c.trim());var o={};hd.forEach(function(h,i){o[h]=v[i]||"";});return o;
  });
}

function getTodayServiceIds(calendarTxt,calendarDatesTxt){
  var today=new Date();
  var dayNames=["sunday","monday","tuesday","wednesday","thursday","friday","saturday"];
  var todayDay=dayNames[today.getDay()];
  var todayStr=today.getFullYear()+("0"+(today.getMonth()+1)).slice(-2)+("0"+today.getDate()).slice(-2);
  var ids=new Set();
  if(calendarTxt){
    csv(calendarTxt).forEach(function(r){
      if(r[todayDay]==="1"||r[todayDay]==="true"){
        var start=r.start_date||"",end=r.end_date||"";
        if((!start||todayStr>=start)&&(!end||todayStr<=end)){ids.add(r.service_id);}
      }
    });
  }
  if(calendarDatesTxt){
    csv(calendarDatesTxt).forEach(function(r){
      if(r.date===todayStr){
        if(r.exception_type==="1")ids.add(r.service_id);
        else if(r.exception_type==="2")ids.delete(r.service_id);
      }
    });
  }
  return ids;
}

function getServiceIdsByDayType(calendarTxt){
  var weekdayIds=new Set(),holidayIds=new Set();
  if(!calendarTxt)return{weekday:weekdayIds,holiday:holidayIds};
  csv(calendarTxt).forEach(function(r){
    var hasWeekday=["monday","tuesday","wednesday","thursday","friday"].some(function(d){return r[d]==="1";});
    var hasHoliday=["saturday","sunday"].some(function(d){return r[d]==="1";});
    if(hasWeekday)weekdayIds.add(r.service_id);
    if(hasHoliday)holidayIds.add(r.service_id);
  });
  return{weekday:weekdayIds,holiday:holidayIds};
}

function calcDist(lat1,lon1,lat2,lon2){
  var R=6371000;
  var dLat=(lat2-lat1)*Math.PI/180;
  var dLon=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function gpsToRoutePos(lat,lon,stops){
  if(!stops||!stops.length)return -1;
  var bestIdx=-1,bestDist=99999;
  for(var i=0;i<stops.length;i++){
    if(!stops[i].lat||!stops[i].lon)continue;
    var d=calcDist(lat,lon,stops[i].lat,stops[i].lon);
    if(d<bestDist){bestDist=d;bestIdx=i;}
  }
  if(bestIdx<0)return -1;
  if(bestDist>1000)return -1;
  return bestIdx;
}

function buildRoute(f,sid,serviceIds){
  var st=csv(f["stops.txt"]),stm=csv(f["stop_times.txt"]),tr=csv(f["trips.txt"]),ro=csv(f["routes.txt"]);
  var validTripIds=new Set();
  tr.forEach(function(t){if(!serviceIds||serviceIds.size===0||serviceIds.has(t.service_id))validTripIds.add(t.trip_id);});
  var tids=[];
  stm.forEach(function(r){if(r.stop_id===sid&&validTripIds.has(r.trip_id)&&tids.indexOf(r.trip_id)<0)tids.push(r.trip_id);});
  if(!tids.length)return null;
  var tid=tids[0];
  var ts=stm.filter(function(r){return r.trip_id===tid;}).sort(function(a,b){return+a.stop_sequence-+b.stop_sequence;});
  var sl=ts.map(function(r){
    var s=st.filter(function(x){return x.stop_id===r.stop_id;})[0];
    return{
      id:r.stop_id,
      name:s?s.stop_name:r.stop_id,
      lat:s&&s.stop_lat?parseFloat(s.stop_lat):null,
      lon:s&&s.stop_lon?parseFloat(s.stop_lon):null
    };
  });
  var sc=tids.slice(0,80).map(function(t){var a=stm.filter(function(r){return r.trip_id===t;}).sort(function(a,b){return+a.stop_sequence-+b.stop_sequence;});return a[0]?(a[0].departure_time||a[0].arrival_time):null;}).filter(Boolean).sort();
  var rid=(tr.filter(function(t){return t.trip_id===tid;})[0]||{}).route_id;
  var rr=ro.filter(function(r){return r.route_id===rid;})[0]||{};
  var tm={};tids.forEach(function(t){var a=stm.filter(function(r){return r.trip_id===t;}).sort(function(a,b){return+a.stop_sequence-+b.stop_sequence;});if(a[0])tm[t]=a[0].departure_time||a[0].arrival_time;});
  var stopIdx=sl.findIndex(function(x){return x.id===sid;});
  var arrivalTimes=tids.slice(0,80).map(function(t){
    var row=stm.filter(function(r){return r.trip_id===t&&r.stop_id===sid;})[0];
    return row?(row.arrival_time||row.departure_time):null;
  }).filter(Boolean).sort();
  var routeTripIds=new Set(tids);

  // 各tripIdの停留所ごとの通過時刻を保存する（GTFSの実データ）
  // stopTimes[tripId][stop_id] = "19:38:00" のような形
  var stopTimes={};
  tids.forEach(function(t){
    stopTimes[t]={};
    stm.filter(function(r){return r.trip_id===t;}).forEach(function(r){
      stopTimes[t][r.stop_id]=r.arrival_time||r.departure_time;
    });
  });

  return{name:rr.route_long_name||rr.route_short_name||"路線",stops:sl,schedules:sc,arrivalTimes:arrivalTimes,iv:3,tm:tm,stopIdx:stopIdx,routeTripIds:routeTripIds,stopTimes:stopTimes};
}

// 全路線の時刻表を行き先付きで構築する（新版）
function buildTimetable(f,sid){
  var stm=csv(f["stop_times.txt"]),tr=csv(f["trips.txt"]);
  var cal=f["calendar.txt"]||"";
  var byDayType=getServiceIdsByDayType(cal);

  // trip_id → headsign の対応表を作る
  var headsigns={};
  tr.forEach(function(t){
    if(t.trip_headsign)headsigns[t.trip_id]=t.trip_headsign;
  });

  var result={weekday:[],holiday:[]};
  ["weekday","holiday"].forEach(function(dt){
    var sids=byDayType[dt];
    var validTripIds=new Set();
    tr.forEach(function(t){if(sids.has(t.service_id))validTripIds.add(t.trip_id);});
    var entries=[];
    stm.forEach(function(r){
      if(r.stop_id===sid&&validTripIds.has(r.trip_id)){
        var t=r.arrival_time||r.departure_time;
        if(t){
          entries.push({
            timeStr:t,
            headsign:headsigns[r.trip_id]||"",
            tripId:r.trip_id
          });
        }
      }
    });
    // 時刻順に並べ替え、同じ時刻・同じ行き先は重複削除
    entries.sort(function(a,b){return a.timeStr.localeCompare(b.timeStr);});
    var seen=new Set();
    result[dt]=entries.filter(function(en){
      var key=en.timeStr+"|"+en.headsign;
      if(seen.has(key))return false;
      seen.add(key);return true;
    });
  });
  return result;
}function buildStopsWithDest(f){
  var stops=csv(f["stops.txt"]||""),trips=csv(f["trips.txt"]||""),st=csv(f["stop_times.txt"]||"");
  var hs={};trips.forEach(function(t){if(t.trip_headsign)hs[t.trip_id]=t.trip_headsign;});
  var dests={};
  st.forEach(function(r){if(!dests[r.stop_id])dests[r.stop_id]=new Set();var h=hs[r.trip_id];if(h)dests[r.stop_id].add(h);});
  var out={};
  stops.forEach(function(s){out[s.stop_id]={name:s.stop_name,dests:dests[s.stop_id]?Array.from(dests[s.stop_id]).slice(0,2):[]};});
  return out;
}

function ct(dep,n,iv){var b=pt(dep),a=[];for(var i=0;i<n;i++)a.push(b+i*iv);return a;}
function gp(times,now){for(var i=0;i<times.length;i++){if(now<times[i]){var p=i===0?0:(now-times[i-1])/(times[i]-times[i-1]);return Math.max(0,i-1+Math.min(1,p));}}return times.length-1;}

function getNextBusInfo(){
  // targetBus指定中はその便の情報を返す
  if(S.targetBus){
    var mtt=S.targetBus.arrivalMin-S.now;
    return{time:S.targetBus.arrivalMin,timeStr:S.targetBus.timeStr,isToday:mtt>-60,mtt:mtt,headsign:S.targetBus.headsign,isTarget:true};
  }
  if(!S.route||!S.route.arrivalTimes||!S.route.arrivalTimes.length)return null;
  var now=S.now;
  var times=S.route.arrivalTimes;
  for(var i=0;i<times.length;i++){
    var t=pt(times[i]);
    if(t>now)return{time:t,timeStr:times[i],isToday:true,mtt:t-now};
  }
  return{time:pt(times[0])+24*60,timeStr:times[0],isToday:false,mtt:pt(times[0])+24*60-now};
}

// 指定便のtripIdを時刻表から探す
function findTripIdByTimeAndHeadsign(timeStr,headsign){
  if(!S.route||!S.route.timetable)return null;
  var dt=S.timetableDayType;
  var entries=S.route.timetable[dt]||[];
  for(var i=0;i<entries.length;i++){
    if(entries[i].timeStr===timeStr&&entries[i].headsign===headsign)return entries[i].tripId;
  }
  return null;
}

// 時刻表の便をタップしたときに呼ぶ
function selectTargetBus(timeStr,headsign){
  var arrivalMin=pt(timeStr);
  // すでに同じ便が選ばれていたら解除（トグル）
  if(S.targetBus&&S.targetBus.timeStr===timeStr&&S.targetBus.headsign===headsign){
    S.targetBus=null;
    S.nids=[];
    render();return;
  }
  S.targetBus={timeStr:timeStr,headsign:headsign,arrivalMin:arrivalMin};
  S.nids=[];// 通知済みリストをリセット
  render();
}

function gb(){
  if(!S.route)return[];
  var iv=S.route.iv||3.5,now=S.now;

  // GPS受信時刻が古いvehicleを除外する
  var validVehicles=S.rv.filter(function(v){
    if(!v.tripId)return false;
    var last=S.lastGpsTime[v.tripId]||0;
    return(Date.now()-last)<S.GPS_EXPIRE;
  });

  function getBestTripId(){
    var gpsTripIds=new Set();
    validVehicles.forEach(function(v){if(v.tripId)gpsTripIds.add(v.tripId);});

    var dt=S.timetableDayType;
    var entries=S.route.timetable?S.route.timetable[dt]||[]:[];

    // 時刻表の便を順番に見て、過去5分以内または未来20分以内かつGPSに存在するものを採用
    for(var i=0;i<entries.length;i++){
      var en=entries[i];
      var t=pt(en.timeStr);
      if(t<now-5||t>now+20)continue;
      if(gpsTripIds.has(en.tripId))return en.tripId;
    }

    // GPSに一致なし：時刻表の次の便を返す（表示用）
    for(var j=0;j<entries.length;j++){
      if(pt(entries[j].timeStr)>now-5)return entries[j].tripId;
    }
    return entries.length?entries[0].tripId:null;
  }

  function getLockedOrBestTripId(){
    var nowMs=Date.now();
    // 固定中のtripIdがまだ有効か確認
    if(S.lockedTripId&&(nowMs-S.lockedAt)<S.LOCK_DURATION){
      // そのtripIdのバスがGPSに存在するか
      var still=validVehicles.some(function(v){return v.tripId===S.lockedTripId;});
      if(still)return S.lockedTripId;
    }
    // 固定を解除して新しいtripIdを選ぶ
    var best=getBestTripId();
    if(best){S.lockedTripId=best;S.lockedAt=nowMs;}
    return best;
  }

  if(S.targetBus){
    var targetTime=S.targetBus.arrivalMin;
    var mtt=targetTime-now;
    var targetTripId=findTripIdByTimeAndHeadsign(S.targetBus.timeStr,S.targetBus.headsign);
    if(S.rid&&validVehicles.length>0&&targetTripId){
      var matched=validVehicles.filter(function(v){return v.tripId===targetTripId;});
      if(matched.length>0){
        var v=matched[0];
        var stopsHaveCoords=S.route.stops&&S.route.stops.some(function(s){return s.lat&&s.lon;});
        if(stopsHaveCoords&&v.lat&&v.lon){
          var pos=gpsToRoutePos(v.lat,v.lon,S.route.stops);
          if(pos>=0){
            // 乗車停留所を通過済みならスキップ
            if(pos>S.ti+0.5)return[{id:"target-timetable",times:[],pos:-1,mtt:mtt,dl:0,rt:false}];
            var dl=(S.rd[targetTripId]||0)/60;
            var gMtt=null;
            var tgStop=S.route.stops[S.ti];
            if(tgStop&&S.route.stopTimes&&S.route.stopTimes[targetTripId]){
              var tgTime=S.route.stopTimes[targetTripId][tgStop.id];
              if(tgTime){
                var curStop=S.route.stops[Math.round(pos)];
                var actualDelay2=0;
                if(curStop&&S.route.stopTimes[targetTripId][curStop.id]){
                  var schNow=pt(S.route.stopTimes[targetTripId][curStop.id]);
                  var ad=now-schNow;
                  if(ad>-5&&ad<30)actualDelay2=ad;
                }
                gMtt=pt(tgTime)+dl+actualDelay2-now;
              }
            }
            if(gMtt===null){var stopsLeft=S.ti-pos;gMtt=stopsLeft*iv+dl;}
            return[{id:"target-gps",times:[],pos:pos,mtt:gMtt,dl:dl,rt:true,lat:v.lat,lon:v.lon}];
          }
        }
      }
    }
    return[{id:"target-timetable",times:[],pos:-1,mtt:mtt,dl:0,rt:false}];
  }

  if(S.rid&&validVehicles.length>0){
    var stopsHaveCoords=S.route.stops&&S.route.stops.some(function(s){return s.lat&&s.lon;});
    var bestTripId=getLockedOrBestTripId();
    var routeTripIds=S.route.routeTripIds||new Set();
    if(bestTripId){
      var exactMatch=validVehicles.filter(function(v){return v.tripId===bestTripId;});
      if(exactMatch.length>0){
        var v2=exactMatch[0];
        var dl2=(S.rd[bestTripId]||0)/60;

        function getMttFromStopTimes(tripId,currentStopIdx){
          var st=S.route.stopTimes&&S.route.stopTimes[tripId];
          if(!st)return null;
          var targetStop=S.route.stops[S.ti];
          if(!targetStop)return null;
          var targetTime=st[targetStop.id];
          if(!targetTime)return null;
          var targetMin=pt(targetTime)+dl2;
          var currentStop=S.route.stops[currentStopIdx];
          if(currentStop){
            var currentTime=st[currentStop.id];
            if(currentTime){
              var scheduledNow=pt(currentTime);
              var actualDelay=now-scheduledNow;
              if(actualDelay>-5&&actualDelay<30){return targetMin+actualDelay-now;}
            }
          }
          return targetMin-now;
        }

        if(stopsHaveCoords&&v2.lat&&v2.lon){
          var pos2=gpsToRoutePos(v2.lat,v2.lon,S.route.stops);
          if(pos2>=0){
            // 乗車停留所を通過済みなら固定解除してリセット
            if(pos2>S.ti+0.5){
              S.lockedTripId=null;S.lockedAt=0;
              return[];
            }
            var mtt2=getMttFromStopTimes(bestTripId,Math.round(pos2));
            if(mtt2===null){var stopsLeft2=S.ti-pos2;mtt2=stopsLeft2*iv+dl2;}
            if(mtt2>-5&&mtt2<120){
              return[{id:"r-"+bestTripId,times:[],pos:pos2,mtt:mtt2,dl:dl2,rt:true,lat:v2.lat,lon:v2.lon}];
            }
          }
        }else if(S.route.tm&&S.route.tm[bestTripId]){
          var targetStop2=S.route.stops[S.ti];
          var mtt3=null;
          if(targetStop2&&S.route.stopTimes&&S.route.stopTimes[bestTripId]){
            var tTime=S.route.stopTimes[bestTripId][targetStop2.id];
            if(tTime)mtt3=pt(tTime)+dl2-now;
          }
          if(mtt3===null){
            var dep=S.route.tm[bestTripId],dl3=dl2;
            var times=ct(dep,S.route.stops.length,iv).map(function(t){return t+dl3;});
            mtt3=times[S.ti]-now;
          }
          if(mtt3>-5&&mtt3<120){
            var pos3b=gp(ct(S.route.tm[bestTripId],S.route.stops.length,iv),now);
            return[{id:"r-"+bestTripId,times:[],pos:pos3b,mtt:mtt3,dl:dl2,rt:true}];
          }
        }
      }
    }
    if(stopsHaveCoords){
      var rb=[];
      validVehicles.forEach(function(v){
        if(!v.lat||!v.lon)return;
        if(routeTripIds.size>0&&!routeTripIds.has(v.tripId))return;
        var pos3=gpsToRoutePos(v.lat,v.lon,S.route.stops);
        if(pos3<0)return;
        if(pos3>S.ti+0.5)return;
        var dl4=(S.rd[v.tripId]||0)/60;
        var stopsLeft3=S.ti-pos3;
        var mtt4=stopsLeft3*iv+dl4;
        if(mtt4<-5||mtt4>120)return;
        rb.push({id:"r-"+v.id,times:[],pos:pos3,mtt:mtt4,dl:dl4,rt:true,lat:v.lat,lon:v.lon});
      });
      if(rb.length){rb.sort(function(a,b){return a.mtt-b.mtt;});return rb;}
    }
  }

  return S.route.schedules.map(function(dep,i){
    var times=ct(dep,S.route.stops.length,iv);
    return{id:"b"+i,times:times,pos:gp(times,now),mtt:times[S.ti]-now,dm:pt(dep),dl:0,rt:false};
  }).filter(function(b){return now>=(b.dm||0)&&b.times[S.ti]>=now-1;});
}

function playAlarm(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    function beep(freq,start,dur){
      var o=ctx.createOscillator();
      var g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;o.type="sine";
      g.gain.setValueAtTime(0,ctx.currentTime+start);
      g.gain.linearRampToValueAtTime(0.4,ctx.currentTime+start+0.02);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+start+dur);
      o.start(ctx.currentTime+start);o.stop(ctx.currentTime+start+dur+0.05);
    }
    beep(880,0,0.15);beep(1100,0.2,0.15);beep(880,0.4,0.15);beep(1100,0.6,0.3);
  }catch(ex){}
}

function cn(){
  if(S.scr!=="monitor"||!S.route)return;
  var buses=S.buses||gb();
  buses.forEach(function(b){
    if(S.nids.indexOf(b.id)>=0)return;
    var f=false,msg="",isGPS=!!b.rt;
    if(S.nm==="stops"){
      var at=S.ti-S.ns;
      if(at>=0&&b.pos>=at-0.3&&b.pos<at+1.5){
        f=true;
        msg="バスが"+S.ns+"つ前「"+(S.route.stops[at]?S.route.stops[at].name:"")+"」に来ました！"+(b.dl>0.5?"（"+Math.round(b.dl)+"分遅れ）":"")+"準備して🏃";
      }
    }else{
      if(b.mtt<=S.nm2+0.5&&b.mtt>0){
        f=true;
        msg="バスがあと約"+Math.ceil(b.mtt)+"分で来ます！"+(b.dl>0.5?"（"+Math.round(b.dl)+"分遅れ）":"")+"準備して🏃";
      }
    }
    if(f){
      S.nids.push(b.id);S.ban={text:msg,isGPS:isGPS};
      playAlarm();
      if(window.Notification&&Notification.permission==="granted")new Notification("🚌",{body:msg+(isGPS?"":" （時刻表ベース）")});
      render();
    }
  });
}

  if(p0>=0)html+='<div style="position:absolute;left:18px;top:6px;height:'+Math.min(p0,S.route.stops.length-1)/(S.route.stops.length-1)*100+'%;width:2px;background:linear-gradient(to bottom,#22c55e,'+T.acc+');border-radius:2px;transition:height 0.8s ease"></div>';
  S.route.stops.forEach(function(s,i){
    var passed=i<p0-0.3,isTgt=i===S.ti,isNot=i===nai,isBus=Math.abs(i-p0)<0.7;
    var col=isBus?"#facc15":isTgt?T.acc:isNot?"#a78bfa":passed?"#22c55e":T.border;
    html+='<div style="display:flex;align-items:center;margin-bottom:'+(i<S.route.stops.length-1?"10px":"0")+';opacity:'+(passed&&!isTgt&&!isNot?"0.3":"1")+'">'
    +'<div style="width:14px;height:14px;border-radius:50%;background:'+col+';border:2px solid '+T.bg+';flex-shrink:0;z-index:1;box-shadow:'+(isBus||isTgt?"0 0 10px "+col:"none")+'"></div>'
    +'<div style="margin-left:12px;font-size:'+(isTgt?"14px":"12px")+';font-weight:'+(isTgt||isBus?"700":"400")+';color:'+(isBus?"#facc15":isTgt?T.acc:isNot?"#a78bfa":passed?T.sub:T.text)+';display:flex;align-items:center;gap:5px;flex-wrap:wrap">'
    +e(s.name)
    +(isTgt?'<span style="background:'+T.acc+'22;color:'+T.acc+';border:1px solid '+T.acc+'44;border-radius:5px;padding:1px 5px;font-size:10px">乗車</span>':"")
    +(isNot&&!isTgt?'<span style="background:#a78bfa22;color:#a78bfa;border:1px solid #a78bfa44;border-radius:5px;padding:1px 5px;font-size:10px">通知</span>':"")
    +(isBus?'<span style="font-size:20px">🚌</span>':"")
    +'</div></div>';
  });
  html+='</div></div>';

  app.innerHTML=html;
}
