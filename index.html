<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バス接近通知 - Bus KURU</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;min-height:100vh;transition:background 1s,color 0.5s;overflow-x:hidden}
#app{max-width:430px;margin:0 auto;padding:16px}
.btn{border:none;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center}
.btn:active{transform:scale(0.98)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes urgent{0%,100%{box-shadow:0 0 0 rgba(239,68,68,0.4)}50%{box-shadow:0 0 16px rgba(239,68,68,0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.card{border-radius:24px;padding:20px;margin-bottom:16px;box-shadow:0 12px 40px rgba(0,0,0,0.12);backdrop-filter:blur(16px);transition:all 0.3s;animation:float 4s ease-in-out infinite}
.card:nth-child(2){animation-delay:0.5s}
.input-text{width:100%;padding:14px;border-radius:14px;border:1px solid rgba(0,0,0,0.1);font-size:14px;outline:none;margin-bottom:12px;background:rgba(255,255,255,0.95);transition:all 0.2s}
.input-text:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,0.15)}
.list-item{padding:14px;border-bottom:1px solid rgba(0,0,0,0.05);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all 0.2s;border-radius:12px;margin-bottom:4px}
.list-item:hover{background:rgba(124,58,237,0.05)}
.badge{padding:4px 8px;border-radius:8px;font-size:11px;font-weight:bold;color:white}
.title-bus{display:inline-block;animation:pulse 2s infinite;margin-right:6px}
.timeline{position:relative;padding-left:24px;margin-left:8px;border-left:2px dashed rgba(124,58,237,0.3)}
.timeline-node{position:absolute;left:-6px;top:6px;width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.3s}
.timeline-node.active{background:#7c3aed;box-shadow:0 0 10px #7c3aed;width:12px;height:12px;left:-7px}
.timeline-node.bus-here{background:#ef4444;border:2px solid white;width:16px;height:16px;left:-9px;animation:pulse 0.8s infinite;box-shadow:0 0 10px #ef4444}
.mode-tabs{display:flex;padding:4px;border-radius:12px;margin-bottom:12px}
.mode-tab-btn{flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:bold;border:none;cursor:pointer;transition:all 0.2s}
.day-tabs{display:flex;gap:6px;margin-bottom:12px;background:rgba(0,0,0,0.04);padding:4px;border-radius:10px}
.day-tab-btn{flex:1;padding:8px;font-size:12px;border-radius:8px;border:none;cursor:pointer;font-weight:bold;transition:all 0.2s}
.timetable-row{display:flex;align-items:center;padding:10px;border-radius:8px;margin-bottom:4px;cursor:pointer;transition:all 0.2s}
</style>
</head>
<body>
<div id="app"></div>
<script>
var W = "https://cold-recipe-799d.kikucchao.workers.dev";

var S = {
  co: null,
  stops: [],
  sStops: [],
  sid: "",
  sname: "",
  trips: [],
  allTripsRaw: [],
  ti: -1,
  mode: 1,
  ns: 1,
  nm2: 5,
  rid: null,
  log: "",
  bg: "",
  theme: 'light',
  searchQuery: "",
  searchResults: [],
  rawFiles: null,
  routeStops: [],
  busCurrentSeq: -1,
  showTimetable: false,
  timetableDayFilter: 'today'
};

var T = {};
function checkTheme(){
  var h = new Date().getHours();
  if(h >= 18 || h < 6){
    S.theme = 'dark';
    T = {bg:'linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%)',card:'rgba(30,41,59,0.85)',text:'#f8fafc',sub:'#94a3b8',acc:'#a78bfa',btn:'#334155',bTxt:'#f8fafc',inputBorder:'rgba(255,255,255,0.15)',tabBg:'#1e293b',tabActive:'#334155',tabUnselected:'#94a3b8',rowBg:'rgba(255,255,255,0.06)'};
  }else{
    S.theme = 'light';
    T = {bg:'linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%)',card:'rgba(255,255,255,0.92)',text:'#1e293b',sub:'#64748b',acc:'#7c3aed',btn:'#e2e8f0',bTxt:'#334155',inputBorder:'rgba(0,0,0,0.08)',tabBg:'rgba(0,0,0,0.05)',tabActive:'#ffffff',tabUnselected:'#64748b',rowBg:'rgba(0,0,0,0.03)'};
  }
  document.body.style.background = T.bg;
  document.body.style.color = T.text;
}
checkTheme();

function e(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function l(m){S.log=m+"\n"+S.log;render();}

function parseCSV(t){
  if(!t)return [];
  var ls = t.split("\n"), hd = ls[0].replace(/\r/g,"").split(",").map(c=>c.trim().replace(/^"|"$/g,""));
  var res = [];
  for(var i=1;i<ls.length;i++){
    var ln = ls[i].replace(/\r/g,""); if(!ln.trim())continue;
    var p = ln.split(","), o = {};
    for(var j=0;j<hd.length;j++) o[hd[j]] = (p[j]||"").trim().replace(/^"|"$/g,"");
    res.push(o);
  }
  return res;
}

function getServiceIdsByGroup(calendarRows, type) {
  var ids = [];
  calendarRows.forEach(r => {
    if (type === 'weekday' && (r.monday === "1" || r.tuesday === "1" || r.wednesday === "1" || r.thursday === "1" || r.friday === "1")) {
      ids.push(r.service_id);
    } else if (type === 'holiday' && (r.saturday === "1" || r.sunday === "1")) {
      ids.push(r.service_id);
    }
  });
  return ids;
}

function getTodayServiceIds(calendarRows){
  var now = new Date();
  var day = now.getDay();
  var ymd = now.getFullYear() + ("0"+(now.getMonth()+1)).slice(-2) + ("0"+now.getDate()).slice(-2);
  var ids = [];
  calendarRows.forEach(r => {
    var m = false;
    if(day===0 && r.sunday==="1") m = true;
    if(day===1 && r.monday==="1") m = true;
    if(day===2 && r.tuesday==="1") m = true;
    if(day===3 && r.wednesday==="1") m = true;
    if(day===4 && r.thursday==="1") m = true;
    if(day===5 && r.friday==="1") m = true;
    if(day===6 && r.saturday==="1") m = true;
    if(m && (!r.start_date || (ymd >= r.start_date && ymd <= r.end_date))) ids.push(r.service_id);
  });
  return ids;
}

async function searchCompany(){
  var q = document.getElementById("coSearch")?.value || "";
  S.searchQuery = q;
  if(!q.trim()) return;
  l("🔍 検索中: " + q);
  try {
    var r = await fetch(W + "/?action=search&q=" + encodeURIComponent(q));
    var d = await r.json();
    if(d.error) { l("❌ " + d.error); return; }
    S.searchResults = d.results || [];
    l("✅ " + S.searchResults.length + "件の事業者が見つかりました");
    render();
  } catch(err) { l("❌ 接続エラー: " + err.message); }
}

async function selectCompany(selected){
  S.co = selected;
  S.stops = []; S.sStops = []; S.sid = ""; S.trips = []; S.ti = -1;
  l("🏢 事業者選択: " + S.co.name);
  render();
  
  try {
    var url = W + "/?action=find_zip&id=" + encodeURIComponent(S.co.id);
    if(S.co.source === "mlit" && S.co.gtfsUrl) {
      url += "&gtfsUrl=" + encodeURIComponent(S.co.gtfsUrl) + "&name=" + encodeURIComponent(S.co.name);
    }
    var r = await fetch(url);
    var d = await r.json();
    if(d.error){ l("❌ データ取得失敗: "+d.error); return; }
    S.bg = d.latestUrl;
    S.co.hasRealtime = d.hasRealtime;
    S.mode = S.co.hasRealtime ? 1 : 2;
    
    var r2 = await fetch(W + "/?action=fetch_stops&url=" + encodeURIComponent(S.bg));
    var d2 = await r2.json();
    if(!d2.success){ l("❌ データの展開に失敗しました"); return; }
    
    S.rawFiles = d2.files;
    var stopsRows = parseCSV(S.rawFiles["stops.txt"]);
    S.stops = [];
    stopsRows.forEach(s => {
      if(s.stop_id && s.stop_name) {
        var direction = s.stop_desc ? s.stop_desc.trim() : "";
        var fullName = s.stop_name;
        if (direction) {
          fullName += " (" + direction + ")";
        }
        S.stops.push({ id: s.stop_id, name: s.stop_name, fullName: fullName });
      }
    });
    S.stops.sort((a,b)=>a.fullName.localeCompare(b.fullName,"ja"));
    S.sStops = S.stops.slice(0,50);
    l("✅ ダイヤ情報の取り込みに成功");
    render();
  } catch(err) { l("❌ 読込エラー: " + err.message); }
}

function onStopInput(el) {
  var q = el.value.trim();
  if(!q){ S.sStops = S.stops.slice(0,50); }
  else { S.sStops = S.stops.filter(s=>s.fullName.includes(q)).slice(0,50); }
  
  var box = document.getElementById("stop-list-box");
  if(box) {
    var h = "";
    S.sStops.forEach(s=>{
      h += '<div class="list-item" style="padding:12px;font-size:13px" onclick="selectStop(\''+s.id+'\',\''+e(s.fullName)+'\')">'
      +'<span>🚏 '+e(s.fullName)+'</span><span style="color:'+T.acc+';font-weight:bold;font-size:12px">選択 ➔</span></div>';
    });
    box.innerHTML = h;
  }
}

async function selectStop(sid, fullStopName){
  S.sid = sid; S.sname = fullStopName; S.trips = []; S.allTripsRaw = []; S.ti = -1; S.timetableDayFilter = 'today';
  l("🚏 バス停確定: " + fullStopName);
  render();

  try {
    var r = await fetch(W + "/?action=fetch_route&url=" + encodeURIComponent(S.bg) + "&stop_id=" + encodeURIComponent(sid));
    var d = await r.json();
    if(!d.success){ l("❌ 運行スケジュール抽出失敗"); return; }
    
    var stList = parseCSV(d.files["stop_times.txt"]), tList = parseCSV(S.rawFiles["trips.txt"]), rList = parseCSV(S.rawFiles["routes.txt"]);
    var rMap = {}; rList.forEach(x=>{ rMap[x.route_id] = x.route_short_name || x.route_long_name; });
    
    var myStops = stList.filter(x=>x.stop_id===sid);
    S.allTripsRaw = [];
    myStops.forEach(x => {
      var tInfo = tList.find(t => t.trip_id === x.trip_id);
      if(!tInfo) return;
      var tstr = x.departure_time || x.arrival_time || "";
      var p = tstr.split(":");
      if(p.length >= 2){
        S.allTripsRaw.push({
          tripId: x.trip_id,
          serviceId: tInfo.service_id,
          timeStr: tstr.substring(0,5),
          min: (+p[0])*60 + (+p[1]),
          rname: rMap[tInfo.route_id] || tInfo.trip_headsign || "一般路線",
          seq: +x.stop_sequence
        });
      }
    });
    
    filterTimetable();
    l("✅ 時刻表データ同期完了");
    render();
  } catch(err) { l("❌ 同期エラー: " + err.message); }
}

function filterTimetable() {
  if(!S.rawFiles) return;
  var calRows = parseCSV(S.rawFiles["calendar.txt"]);
  var targetServiceIds = [];
  
  if (S.timetableDayFilter === 'today') targetServiceIds = getTodayServiceIds(calRows);
  else if (S.timetableDayFilter === 'weekday') targetServiceIds = getServiceIdsByGroup(calRows, 'weekday');
  else if (S.timetableDayFilter === 'holiday') targetServiceIds = getServiceIdsByGroup(calRows, 'holiday');
  
  S.trips = S.allTripsRaw.filter(t => targetServiceIds.length === 0 || targetServiceIds.includes(t.serviceId));
  S.trips.sort((a,b)=>a.min-b.min);
  
  var now = new Date();
  var curMin = now.getHours()*60 + now.getMinutes();
  
  if(S.timetableDayFilter === 'today') {
    var nextIdx = S.trips.findIndex(t => t.min >= curMin);
    S.ti = nextIdx;
  } else {
    S.ti = S.trips.length > 0 ? 0 : -1;
  }
  if(S.ti >= 0) buildRouteLine();
}

function buildRouteLine(){
  if(S.ti < 0 || !S.rawFiles) return;
  var tr = S.trips[S.ti];
  var stList = parseCSV(S.rawFiles["stop_times.txt"]);
  var stopMap = {};
  parseCSV(S.rawFiles["stops.txt"]).forEach(s=>{ stopMap[s.stop_id] = s.stop_name; });
  
  var tripStops = stList.filter(x => x.trip_id === tr.tripId);
  tripStops.sort((a,b) => (+a.stop_sequence) - (+b.stop_sequence));
  
  S.routeStops = tripStops.map(x => ({
    seq: +x.stop_sequence,
    id: x.stop_id,
    name: stopMap[x.stop_id] || "停留所",
    time: (x.arrival_time || x.departure_time || "").substring(0,5)
  }));
}

function drt(){
  if(S.rid){ clearInterval(S.rid); S.rid = null; l("🛑 接近監視を停止しました"); render(); return; }
  if(S.ti < 0){ alert("有効な便を選択してください"); return; }
  
  var tr = S.trips[S.ti];
  l("🚀 接近監視開始: " + tr.timeStr);
  
  S.rid = setInterval(async function(){
    try {
      var now = new Date();
      var curMin = now.getHours()*60 + now.getMinutes();
      
      if(S.mode === 2 || !S.co.hasRealtime) {
        var diff = tr.min - curMin;
        var passed = S.routeStops.filter(s => {
          var p = s.time.split(":");
          return ((+p[0])*60 + (+p[1])) <= curMin;
        });
        if(passed.length > 0) S.busCurrentSeq = passed[passed.length-1].seq;
        if(diff <= S.nm2 && diff >= 0){ sendNotification("🚌 バス接近", S.sname + " にまもなく到着します。"); drt(); }
        render(); return;
      }
      
      var r = await fetch(W + "/?action=realtime&id=" + encodeURIComponent(S.co.id));
      var d = await r.json();
      var vs = d.vehicles || [];
      var targetBus = vs.find(v => v.tripId === tr.tripId);
      
      if(targetBus) {
        if(S.busCurrentSeq === -1) S.busCurrentSeq = S.routeStops[0].seq;
        else if(S.busCurrentSeq < tr.seq) S.busCurrentSeq++;
        var dist = tr.seq - S.busCurrentSeq;
        if(dist <= S.ns && dist >= 0){ sendNotification("🚌 バス接近", S.sname + " の " + dist + " 個手前です！"); drt(); }
      }
      render();
    } catch(err){}
  }, 10000);
  render();
}

function sendNotification(title, body){
  if(window.Notification && Notification.permission === "granted") new Notification(title, {body:body});
  else alert(title + "\n" + body);
}

function updateSliderValue(val, isMode1) {
  if(isMode1) { S.ns = +val; document.getElementById("slider-val-txt").innerText = val + "個前の停留所"; }
  else { S.nm2 = +val; document.getElementById("slider-val-txt").innerText = val + "分前"; }
}

function render(){
  var app = document.getElementById("app");
  if(!app) return;
  
  var html = '<div style="font-weight:900;font-size:26px;margin-bottom:20px;display:flex;align-items:center;letter-spacing:-0.5px">'
  +'<span><span class="title-bus">🚌</span>Bus KURU</span></div>';
  
  if(S.sid && S.allTripsRaw.length > 0){
    var now = new Date();
    var curMin = now.getHours()*60 + now.getMinutes();
    
    html += '<div class="card" style="background:'+T.card+';border-top:6px solid '+T.acc+'">'
    +'<div style="display:flex;gap:8px;margin-bottom:16px">'
    +'<button onclick="S.co=null;S.sid=\'\';S.routeStops=[];render()" class="btn" style="background:'+T.btn+';color:'+T.bTxt+';padding:8px 14px;font-size:12px;border-radius:10px">🔄 会社変更</button>'
    +'<button onclick="S.sid=\'\';S.routeStops=[];render()" class="btn" style="background:'+T.btn+';color:'+T.bTxt+';padding:8px 14px;font-size:12px;border-radius:10px">🚏 バス停変更</button>'
    +'<button onclick="S.showTimetable=!S.showTimetable;render()" class="btn" style="background:'+T.acc+';color:white;padding:8px 14px;font-size:12px;border-radius:10px">📅 時刻表</button>'
    +'</div>'
    
    +'<div style="font-size:20px;font-weight:bold;margin-bottom:4px;letter-spacing:-0.3px">🚏 '+e(S.sname)+'</div>'
    +'<div style="font-size:13px;color:'+T.sub+';margin-bottom:16px;font-weight:500">'+e(S.co.name)+'</div>';
    
    if(S.showTimetable){
      html += '<div style="background:rgba(0,0,0,0.02);padding:12px;border-radius:18px;margin-bottom:16px;border:1px solid '+T.inputBorder+'">'
      +'<div class="day-tabs">'
      +'<button onclick="S.timetableDayFilter=\'today\';filterTimetable();render()" class="day-tab-btn" style="background:'+(S.timetableDayFilter==='today'?T.tabActive:'transparent')+';color:'+(S.timetableDayFilter==='today'?T.text:T.tabUnselected)+'">今日</button>'
      +'<button onclick="S.timetableDayFilter=\'weekday\';filterTimetable();render()" class="day-tab-btn" style="background:'+(S.timetableDayFilter==='weekday'?T.tabActive:'transparent')+';color:'+(S.timetableDayFilter==='weekday'?T.text:T.tabUnselected)+'">平日</button>'
      +'<button onclick="S.timetableDayFilter=\'holiday\';filterTimetable();render()" class="day-tab-btn" style="background:'+(S.timetableDayFilter==='holiday'?T.tabActive:'transparent')+';color:'+(S.timetableDayFilter==='holiday'?T.text:T.tabUnselected)+'">土日祝</button>'
      +'</div>'
      +'<div style="max-height:220px;overflow-y:auto;padding-right:2px">';
      if(S.trips.length === 0) {
        html += '<div style="font-size:13px;color:'+T.sub+';padding:20px;text-align:center">運行便はありません</div>';
      } else {
        S.trips.forEach((tk, idx) => {
          var isSelected = S.ti === idx;
          html += '<div class="timetable-row" style="background:'+(isSelected?T.acc:T.rowBg)+';color:'+(isSelected?'#ffffff':T.text)+'" onclick="S.ti='+idx+';buildRouteLine();render()">'
          +'<span style="font-weight:bold;font-family:monospace;font-size:14px;min-width:55px">⏱️ '+tk.timeStr+'</span>'
          +'<span style="margin-left:12px;font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+e(tk.rname)+'</span>'
          +'<span style="margin-left:8px;opacity:0.5">➔</span></div>';
        });
      }
      html += '</div></div>';
    }
    
    html += '<div style="background:'+T.btn+';padding:20px;border-radius:18px;text-align:center;margin-bottom:18px">';
    if(S.ti >= 0) {
      var tr = S.trips[S.ti];
      var remMin = tr.min - curMin;
      if(remMin > 0) {
        html += '<div style="font-size:28px;font-weight:900;color:'+T.acc+';letter-spacing:-0.5px">あと '+remMin+' 分で到着</div>'
        +'<div style="font-size:13px;color:'+T.sub+';margin-top:6px;font-weight:600">発車：'+tr.timeStr+' （'+e(tr.rname)+'）</div>';
      } else if(remMin === 0) {
        html += '<div style="font-size:28px;font-weight:900;color:#ef4444;letter-spacing:-0.5px">まもなく到着</div>';
      } else {
        html += '<div style="font-size:16px;font-weight:700;color:'+T.sub+'">選択した便は通過しました</div>';
      }
    } else {
      html += '<div style="font-size:16px;font-weight:700;color:'+T.sub+'">本日の最終便はすべて終了しました</div>';
    }
    html += '</div>';
    
    if(S.ti >= 0 && S.routeStops.length > 0) {
      html += '<div style="font-weight:700;font-size:13px;color:'+T.sub+';margin-bottom:14px;letter-spacing:0.5px">🚌 運行ルート現在地</div>'
      +'<div class="timeline">';
      S.routeStops.forEach(st => {
        var isTarget = st.id === S.sid;
        var isBusHere = st.seq === S.busCurrentSeq;
        var nodeClass = isBusHere ? 'timeline-node bus-here' : (isTarget ? 'timeline-node active' : 'timeline-node');
        var labelStyle = isTarget ? 'font-weight:bold;color:'+T.acc : (isBusHere ? 'font-weight:bold;color:#ef4444' : 'color:'+T.text);
        
        html += '<div style="position:relative;margin-bottom:14px;font-size:13px;display:flex;justify-content:space-between;'+labelStyle+'">'
        +'<div class="'+nodeClass+'"></div>'
        +'<span style="max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(isBusHere?'🚌 ':'')+e(st.name)+(isTarget?' (乗車)':'')+'</span>'
        +'<span style="color:'+T.sub+';font-size:12px;font-family:monospace">'+st.time+'</span>'
        +'</div>';
      });
      html += '</div>';
      
      html += '<div style="border-top:1px dashed rgba(0,0,0,0.1);padding-top:14px;margin-top:14px">';
      if(S.co.hasRealtime) {
        html += '<div class="mode-tabs" style="background:'+T.tabBg+'">'
        +'<button onclick="S.mode=1;render()" class="mode-tab-btn" style="background:'+(S.mode===1?T.tabActive:'transparent')+';color:'+(S.mode===1?T.text:T.tabUnselected)+'">停留所数カウント</button>'
        +'<button onclick="S.mode=2;render()" class="mode-tab-btn" style="background:'+(S.mode===2?T.tabActive:'transparent')+';color:'+(S.mode===2?T.text:T.tabUnselected)+'">到着前の分数</button>'
        +'</div>';
      }
      
      if(S.mode === 1 && S.co.hasRealtime){
        html += '<div style="display:flex;justify-content:space-between;font-size:12px;color:'+T.sub+';margin-bottom:6px"><span>通知タイミング</span><span id="slider-val-txt" style="color:'+T.acc+';font-weight:700">'+S.ns+'個前の停留所</span></div>'
        +'<input type="range" style="accent-color:'+T.acc+';width:100%;cursor:pointer" min="1" max="5" value="'+S.ns+'" oninput="updateSliderValue(this.value, true)">';
      } else {
        html += '<div style="display:flex;justify-content:space-between;font-size:12px;color:'+T.sub+';margin-bottom:6px"><span>通知タイミング</span><span id="slider-val-txt" style="color:'+T.acc+';font-weight:700">'+S.nm2+'分前</span></div>'
        +'<input type="range" style="accent-color:'+T.acc+';width:100%;cursor:pointer" min="1" max="15" value="'+S.nm2+'" oninput="updateSliderValue(this.value, false)">';
      }
      html += '</div>';
      
      var isRun = S.rid !== null;
      html += '<button onclick="if(window.Notification)Notification.requestPermission()" class="btn" style="width:100%;padding:12px;background:'+T.btn+';color:'+T.bTxt+';margin-top:18px;margin-bottom:8px">🔔 スマホ通知を許可する</button>'
      +'<button onclick="drt()" class="btn" style="width:100%;padding:16px;background:'+(isRun?'#ef4444':T.acc)+';color:white;font-size:15px;font-weight:700;box-shadow:0 6px 20px rgba(124,58,237,0.25);animation:'+(isRun?'urgent 2s infinite':'none')+'">'+(isRun?'🛑 接近監視を停止する':'🚀 この便の接近通知をONにする')+'</button>';
    }
    html += '</div>';
    
  } else {
    html += '<div class="card" style="background:'+T.card+'">'
    +'<div style="font-weight:700;margin-bottom:10px;font-size:13px;color:'+T.sub+';letter-spacing:0.5px">乗車するバス会社を探す</div>'
    +'<div style="display:flex;gap:8px"><input id="coSearch" type="text" class="input-text" style="margin-bottom:0" placeholder="例：十勝バス、北海道拓殖バス" value="'+e(S.searchQuery)+'" onkeydown="if(event.key===\'Enter\')searchCompany()">'
    +'<button onclick="searchCompany()" class="btn" style="background:'+T.acc+';color:white;padding:0 20px;border-radius:12px">検索</button></div>';
    
    if(S.searchResults.length > 0){
      html += '<div style="margin-top:12px;max-height:160px;overflow-y:auto;border:1px solid '+T.inputBorder+';border-radius:14px;background:rgba(255,255,255,0.4)">';
      S.searchResults.forEach(r=>{
        var badgeColor = r.hasRealtime ? '#10b981' : '#f59e0b';
        var badgeText = r.hasRealtime ? 'リアルタイム' : '時刻表のみ';
        html += '<div class="list-item" onclick=\'selectCompany('+JSON.stringify(r)+')\'>'
        +'<span style="font-size:13px;font-weight:600">'+e(r.name)+'</span>'
        +'<span class="badge" style="background:'+badgeColor+'">'+badgeText+'</span></div>';
      });
      html += '</div>';
    }
    if(S.co) html += '<div style="margin-top:12px;font-weight:bold;color:'+T.acc+';font-size:13px">選択中：'+e(S.co.name)+'</div>';
    html += '</div>';
    
    if(S.co){
      html += '<div class="card" style="background:'+T.card+'">'
      +'<div style="font-weight:700;margin-bottom:10px;font-size:13px;color:'+T.sub+';letter-spacing:0.5px">乗車するバス停（方面・のりば）</div>'
      +'<input type="text" class="input-text" placeholder="バス停名を入力..." oninput="onStopInput(this)">'
      +'<div id="stop-list-box" style="max-height:260px;overflow-y:auto;background:rgba(0,0,0,0.01);border-radius:14px;border:1px solid '+T.inputBorder+'">';
      S.sStops.forEach(s=>{
        html += '<div class="list-item" style="padding:12px;font-size:13px" onclick="selectStop(\''+s.id+'\',\''+e(s.fullName)+'\')">'
        +'<span>🚏 '+e(s.fullName)+'</span><span style="color:'+T.acc+';font-weight:bold;font-size:12px">選択 ➔</span></div>';
      });
      html += '</div></div>';
    }
  }
  
  html += '<div style="margin-top:20px"><div style="font-size:11px;color:'+T.sub+';margin-bottom:6px;font-weight:bold">🛠️ システムログ</div>'
  +'<textarea readonly style="width:100%;height:80px;background:rgba(0,0,0,0.04);border:none;border-radius:12px;padding:10px;font-family:monospace;font-size:11px;color:'+T.sub+';resize:none;outline:none">'+e(S.log)+'</textarea></div>';
  
  app.innerHTML = html;
}

render();
</script>
</body>
</html>
