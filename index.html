<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バス接近通知 - Bus KURU</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1628;color:#e2e8f0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;min-height:100vh}
#app{max-width:430px;margin:0 auto;padding:14px}
.card{background:#1e293b;border-radius:14px;padding:16px;border:1px solid #334155;margin-bottom:14px}
.btn{border:none;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px}
.inp{background:#0a1628;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;width:100%}
input[type=range]{accent-color:#0ea5e9;width:100%}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes urgent{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}50%{box-shadow:0 0 0 14px rgba(239,68,68,0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
var W="https://cold-recipe-799d.kikucchao.workers.dev";
var S={
  scr:"welcome",
  route:null,ti:0,
  gurl:null,rid:null,hasRT:false,
  stops:[],sf:"",
  sq:"",sr:[],
  lm:"",le:"",
  nm:"stops",ns:2,nm2:5,
  ban:null,nids:[],
  now:0,ss:false,
  rv:[],rd:{},re:"",lu:0,
  mn:"",ms:"",mt:"",mi:"3"
};
function gn(){var n=new Date();return n.getHours()*60+n.getMinutes()+n.getSeconds()/60;}
S.now=gn();
function e(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function pt(s){if(!s)return 0;var p=s.split(":");return+p[0]*60+(+p[1])+(p[2]?+p[2]/60:0);}
function ft(m){var h=Math.floor(m/60)%24,n=Math.round(m%60);return(h<10?"0":"")+h+":"+(n<10?"0":"")+n;}
function sv(c){try{localStorage.setItem("bk7",JSON.stringify(c));}catch(x){}}
function lv(){try{var s=localStorage.getItem("bk7");return s?JSON.parse(s):null;}catch(x){return null;}}
function csv(t){
  if(!t)return[];
  var ls=t.trim().split("\n");if(ls.length<2)return[];
  var hd=ls[0].replace(/\r/g,"").split(",").map(function(h){return h.trim().replace(/^"|"$/g,"");});
  return ls.slice(1).filter(function(l){return l.trim();}).map(function(l){
    var v=[],c="",q=false,ch=l.replace(/\r/g,"").split("");
    for(var i=0;i<ch.length;i++){if(ch[i]==='"'){q=!q;}else if(ch[i]===","&&!q){v.push(c.trim());c="";}else{c+=ch[i];}}
    v.push(c.trim());var o={};hd.forEach(function(h,i){o[h]=v[i]||"";});return o;
  });
}
function bld(f,sid){
  var st=csv(f["stops.txt"]),stm=csv(f["stop_times.txt"]),tr=csv(f["trips.txt"]),ro=csv(f["routes.txt"]);
  var tids=[];stm.forEach(function(r){if(r.stop_id===sid&&tids.indexOf(r.trip_id)<0)tids.push(r.trip_id);});
  if(!tids.length)return null;
  var tid=tids[0];
  var ts=stm.filter(function(r){return r.trip_id===tid;}).sort(function(a,b){return+a.stop_sequence-+b.stop_sequence;});
  var sl=ts.map(function(r){var s=st.filter(function(x){return x.stop_id===r.stop_id;})[0];return{id:r.stop_id,name:s?s.stop_name:r.stop_id};});
  var sc=tids.slice(0,50).map(function(t){var a=stm.filter(function(r){return r.trip_id===t;}).sort(function(a,b){return+a.stop_sequence-+b.stop_sequence;});return a[0]?(a[0].departure_time||a[0].arrival_time):null;}).filter(Boolean).sort();
  var rid=(tr.filter(function(t){return t.trip_id===tid;})[0]||{}).route_id;
  var rr=ro.filter(function(r){return r.route_id===rid;})[0]||{};
  var tm={};tids.forEach(function(t){var a=stm.filter(function(r){return r.trip_id===t;}).sort(function(a,b){return+a.stop_sequence-+b.stop_sequence;});if(a[0])tm[t]=a[0].departure_time||a[0].arrival_time;});
  return{name:rr.route_long_name||rr.route_short_name||"路線",stops:sl,schedules:sc,iv:3,tm:tm};
}
function ct(dep,n,iv){var b=pt(dep),a=[];for(var i=0;i<n;i++)a.push(b+i*iv);return a;}
function gp(times,now){for(var i=0;i<times.length;i++){if(now<times[i]){var p=i===0?0:(now-times[i-1])/(times[i]-times[i-1]);return Math.max(0,i-1+Math.min(1,p));}}return times.length-1;}
function gb(){
  if(!S.route)return[];
  var iv=S.route.iv||3.5,now=S.now;
  if(S.rid&&S.rv.length>0&&S.route.tm){
    var rb=[];
    S.rv.forEach(function(v){
      if(!v.tripId||!S.route.tm[v.tripId])return;
      var dep=S.route.tm[v.tripId],dl=(S.rd[v.tripId]||0)/60;
      var times=ct(dep,S.route.stops.length,iv).map(function(t){return t+dl;});
      var mtt=times[S.ti]-now;
      if(mtt<-5||mtt>120)return;
      rb.push({id:"r-"+v.tripId,times:times,pos:gp(times,now),mtt:mtt,dl:dl,rt:true});
    });
    if(rb.length){rb.sort(function(a,b){return a.mtt-b.mtt;});return rb;}
  }
  return S.route.schedules.map(function(dep,i){
    var times=ct(dep,S.route.stops.length,iv);
    return{id:"b"+i,times:times,pos:gp(times,now),mtt:times[S.ti]-now,dm:pt(dep),dl:0,rt:false};
  }).filter(function(b){return now>=(b.dm||0)&&b.times[S.ti]>=now-1;});
}
var rtt=null;
function srt(){if(rtt)clearInterval(rtt);drt();rtt=setInterval(drt,30000);}
function drt(){
  if(!S.rid)return;
  fetch(W+"/?action=realtime&id="+S.rid).then(function(r){return r.json();}).then(function(d){
    if(!d.error){S.rv=d.vehicles||[];S.rd=d.delays||{};S.re="";S.lu=Date.now();}
    else S.re=d.error;
    cn();if(S.scr==="monitor")render();
  }).catch(function(ex){S.re=ex.message;});
}
setInterval(function(){S.now=gn();cn();if(S.scr==="monitor")render();},30000);
function cn(){
  if(S.scr!=="monitor"||!S.route)return;
  gb().forEach(function(b){
    if(S.nids.indexOf(b.id)>=0)return;
    var f=false,msg="";
    if(S.nm==="stops"){var at=S.ti-S.ns;if(at>=0&&b.pos>=at&&b.pos<at+1.2){f=true;msg="バスが"+S.ns+"つ前「"+(S.route.stops[at]?S.route.stops[at].name:"")+"」に来ました！"+(b.dl>0.5?"（"+Math.round(b.dl)+"分遅れ）":"")+"準備して🏃";}}
    else{if(b.mtt<=S.nm2&&b.mtt>0){f=true;msg="バスがあと約"+Math.ceil(b.mtt)+"分で来ます！"+(b.dl>0.5?"（"+Math.round(b.dl)+"分遅れ）":"")+"準備して🏃";}}
    if(f){S.nids.push(b.id);S.ban=msg;if(window.Notification&&Notification.permission==="granted")new Notification("🚌",{body:msg});render();}
  });
}
function hs(){
  if(!S.sq.trim())return;
  S.le="";S.sr=[];S.lm="検索中…";render();
  fetch(W+"/?action=search&q="+encodeURIComponent(S.sq)).then(function(r){return r.json();}).then(function(d){
    if(d.error)throw new Error(d.error);
    S.sr=d.results||[];S.lm=S.sr.length?"":"見つかりませんでした";render();
  }).catch(function(ex){S.le=ex.message;S.lm="";render();});
}
function sc(i){
  var co=S.sr[i];
  S.le="";S.sr=[];S.scr="loading";S.lm="時刻表を探しています…";render();
  var p;
  if(co.source==="known"){
    p=fetch(W+"/?action=find_zip&id="+co.id).then(function(r){return r.json();}).then(function(d){
      if(d.error)throw new Error(d.error);
      S.rid=d.hasRealtime?co.id:null;
      S.hasRT=!!d.hasRealtime;
      return d.latestUrl;
    });
  }else{S.rid=null;S.hasRT=false;p=Promise.resolve(co.gtfsUrl);}
  p.then(function(u){
    if(!u)throw new Error("URLなし");
    S.gurl=u;S.lm="停留所を読み込み中…";render();
    return fetch(W+"/?action=fetch_stops&url="+encodeURIComponent(u));
  }).then(function(r){return r.json();}).then(function(d){
    if(d.error)throw new Error(d.error);
    S.stops=csv(d.files["stops.txt"]);S.sf="";S.lm="";S.scr="stop_select";render();
  }).catch(function(ex){S.le=ex.message;S.lm="";S.scr="welcome";render();});
}
function ss(sid){
  S.scr="loading";S.lm="時刻表を読み込み中…";render();
  fetch(W+"/?action=fetch_route&url="+encodeURIComponent(S.gurl)+"&stop_id="+encodeURIComponent(sid))
  .then(function(r){return r.json();}).then(function(d){
    if(d.error)throw new Error(d.error);
    var res=bld(d.files,sid);if(!res)throw new Error("便が見つかりません");
    var ns2=res.stops.map(function(x){return{id:x.id,name:x.name};});
    var ni=0;for(var i=0;i<res.stops.length;i++){if(res.stops[i].id===sid){ni=i;break;}}
    var nr={name:res.name,stops:ns2,schedules:res.schedules,iv:3,tm:res.tm};
    sv({route:nr,ti:ni,gurl:S.gurl,rid:S.rid,hasRT:S.hasRT,nm:S.nm,ns:S.ns,nm2:S.nm2});
    S.route=nr;S.ti=ni;S.nids=[];S.scr="monitor";
    if(S.rid)srt();render();
  }).catch(function(ex){S.le=ex.message;S.scr="stop_select";render();});
}
function am(){
  var stops=S.ms.split("\n").map(function(x){return x.trim();}).filter(Boolean).map(function(n,i){return{id:"m"+i,name:n};});
  var sc2=S.mt.split("\n").map(function(x){return x.trim();}).filter(function(x){return/^\d{1,2}:\d{2}$/.test(x);});
  if(stops.length<2){alert("停留所を2つ以上");return;}if(!sc2.length){alert("時刻表を入力してください");return;}
  var nr={name:S.mn||"手動入力路線",stops:stops,schedules:sc2,iv:parseFloat(S.mi)||3};
  sv({route:nr,ti:stops.length-1,nm:S.nm,ns:S.ns,nm2:S.nm2});
  S.route=nr;S.ti=stops.length-1;S.nids=[];S.rid=null;S.hasRT=false;S.scr="monitor";render();
}
function rsl(){
  var el=document.getElementById("sl");if(!el)return;
  var f=S.sf,sh=(f?S.stops.filter(function(x){return(x.stop_name&&x.stop_name.indexOf(f)>=0)||(x.stop_id&&x.stop_id.indexOf(f)>=0);}):S.stops).slice(0,200);
  var h='<div style="background:#1e293b;border-radius:14px;border:1px solid #334155;overflow:hidden">';
  if(!sh.length)h+='<div style="padding:16px;text-align:center;color:#475569">該当なし</div>';
  sh.forEach(function(x,i){
    h+='<div onclick="ss(\''+e(x.stop_id)+'\')" style="padding:12px 14px;border-bottom:'+(i<sh.length-1?"1px solid #1e3a5f":"none")+';cursor:pointer;display:flex;align-items:center;gap:10px">'
    +'<div style="font-size:16px">🚏</div>'
    +'<div style="flex:1">'
    +'<div style="font-size:14px;color:#e2e8f0">'+e(x.stop_name)+'</div>'
    +'<div style="font-size:11px;color:#475569">'+e(x.stop_id)+'</div>'
    +'</div>'
    +'<div style="color:#475569">›</div></div>';
  });
  h+='</div><div style="font-size:11px;color:#1e3a5f;text-align:center;margin-top:6px">'+(sh.length<200?sh.length+"件":"上位200件")+'</div>';
  el.innerHTML=h;
}
function goChangeCompany(){
  S.scr="welcome";S.sq="";S.sr=[];S.lm="";S.le="";S.ss=false;
  if(rtt)clearInterval(rtt);render();
}
function goChangeStop(){
  if(!S.gurl){goChangeCompany();return;}
  S.scr="stop_select";S.sf="";S.ss=false;render();
}
function render(){
  var app=document.getElementById("app"),html="",buses=gb(),nx=null;
  for(var i=0;i<buses.length;i++){if(buses[i].mtt>0){nx=buses[i];break;}}
  var mins=nx?Math.ceil(nx.mtt):null,urg=mins!==null&&mins<=3;
  var nai=S.nm==="stops"?Math.max(0,S.ti-S.ns):null;

  if(S.ban){
    html+='<div style="position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:200;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:white;padding:12px 16px;border-radius:14px;box-shadow:0 8px 24px rgba(14,165,233,0.5);max-width:90vw;display:flex;align-items:center;gap:10px">'
    +'<span>🔔</span><span style="font-size:13px;font-weight:600;flex:1">'+e(S.ban)+'</span>'
    +'<button onclick="S.ban=null;render()" style="background:rgba(255,255,255,0.2);border:none;color:white;border-radius:6px;padding:3px 8px;cursor:pointer">✕</button></div>';
  }

  // ローディング
  if(S.scr==="loading"){
    app.innerHTML='<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">'
    +'<div style="font-size:48px;margin-bottom:16px">🚌</div>'
    +'<div style="font-size:14px;color:#94a3b8;margin-bottom:14px">'+e(S.lm)+'</div>'
    +'<button onclick="S.scr=\'welcome\';S.lm=\'\';S.le=\'\';render()" class="btn" style="background:#1e293b;padding:10px 18px;color:#64748b">キャンセル</button>'
    +'</div>';
    return;
  }

  // ウェルカム
  if(S.scr==="welcome"){
    var h2='<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px">'
    +'<div style="text-align:center;margin-bottom:24px">'
    +'<div style="font-size:48px;margin-bottom:10px;animation:float 2.5s ease-in-out infinite">🚌</div>'
    +'<div style="font-size:20px;font-weight:800;margin-bottom:6px">バス接近通知</div>'
    +'<div style="font-size:13px;color:#475569;line-height:1.8">バス会社名を入力するだけで<br>時刻表を自動取得します</div>'
    +'</div>'
    +'<div style="width:100%;max-width:380px">'
    +'<div style="display:flex;gap:8px;margin-bottom:10px">'
    +'<input id="sq" type="text" class="inp" placeholder="バス会社名（例：十勝バス）" value="'+e(S.sq)+'" style="flex:1;border-radius:12px;padding:12px 14px;font-size:15px">'
    +'<button onclick="S.sq=document.getElementById(\'sq\').value;hs()" class="btn" style="padding:12px 16px;background:#0ea5e9;color:white;font-size:15px;flex-shrink:0">検索</button>'
    +'</div>';
    if(S.le)h2+='<div style="background:#450a0a;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:#f87171">'+e(S.le)+'</div>';
    if(S.lm)h2+='<div style="text-align:center;color:#475569;font-size:13px;margin-bottom:8px">'+e(S.lm)+'</div>';
    if(S.sr.length){
      h2+='<div style="background:#1e293b;border-radius:14px;border:1px solid #334155;overflow:hidden;margin-bottom:10px">'
      +'<div style="font-size:11px;color:#475569;padding:8px 14px 4px">'+S.sr.length+'件</div>';
      S.sr.forEach(function(co,i){
        h2+='<div onclick="sc('+i+')" style="padding:12px 14px;border-top:1px solid #1e3a5f;cursor:pointer;display:flex;align-items:center;gap:10px">'
        +'<div style="font-size:18px">🚌</div>'
        +'<div style="flex:1">'
        +'<div style="font-size:14px;font-weight:600">'+e(co.name)+'</div>'
        +'<div style="font-size:11px;margin-top:2px">'
        +(co.hasRealtime
          ?'<span style="color:#22c55e">● リアルタイムGPS対応</span>'
          :'<span style="color:#94a3b8">○ 時刻表ベース</span>')
        +'</div></div>'
        +'<div style="color:#475569">›</div></div>';
      });
      h2+='</div>';
    }
    h2+='<div style="text-align:center"><button onclick="S.scr=\'manual\';render()" style="background:none;border:none;color:#334155;font-size:13px;cursor:pointer;text-decoration:underline">手動で入力する</button></div>'
    +'</div></div>';
    app.innerHTML=h2;
    var sq2=document.getElementById("sq");
    if(sq2)sq2.onkeydown=function(ev){if(ev.key==="Enter"){S.sq=sq2.value;hs();}};
    return;
  }

  // 停留所選択
  if(S.scr==="stop_select"){
    if(!document.getElementById("sl")){
      var rtBadge=S.hasRT
        ?'<div style="font-size:12px;color:#22c55e;margin-top:4px">● このバス会社はリアルタイムGPS対応です</div>'
        :'<div style="font-size:12px;color:#94a3b8;margin-top:4px">○ 時刻表ベースで動作します</div>';
      app.innerHTML='<div style="background:linear-gradient(135deg,#0ea5e9,#6366f1);padding:22px 14px 14px;margin:-14px -14px 14px">'
      +'<button onclick="goChangeCompany()" style="background:rgba(255,255,255,0.15);border:none;border-radius:8px;color:white;padding:5px 10px;font-size:13px;cursor:pointer;margin-bottom:10px;display:block">← バス会社を変更</button>'
      +'<div style="font-size:17px;font-weight:800">乗る停留所を選んでください</div>'
      +'<div style="font-size:12px;color:rgba(255,255,255,0.8);margin-top:3px">同じ名前の停留所は上り・下りが分かれています</div>'
      +rtBadge
      +'</div>'
      +'<div class="card"><input id="sf" type="text" class="inp" placeholder="🔍 停留所名で絞り込み…"></div>'
      +'<div id="sl"></div>';
      var sf2=document.getElementById("sf");
      if(sf2)sf2.addEventListener("input",function(ev){S.sf=ev.target.value;rsl();});
    }
    rsl();return;
  }

  // 手動入力
  if(S.scr==="manual"){
    app.innerHTML='<button onclick="S.scr=\'welcome\';render()" style="background:#1e293b;border:1px solid #334155;border-radius:8px;color:#64748b;padding:6px 12px;font-size:13px;cursor:pointer;margin-bottom:14px;display:block">← 戻る</button>'
    +'<div style="font-size:16px;font-weight:700;margin-bottom:12px">✏️ 手動入力</div>'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:4px">路線名</div><input id="mn2" type="text" class="inp" value="'+e(S.mn)+'" placeholder="路線名" style="margin-bottom:10px">'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:4px">停留所（1行に1つ）</div><textarea id="ms2" class="inp" rows="5" style="margin-bottom:10px;resize:vertical">'+e(S.ms)+'</textarea>'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:4px">出発時刻（1行に1つ）</div><textarea id="mt2" class="inp" rows="4" style="margin-bottom:10px;resize:vertical">'+e(S.mt)+'</textarea>'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:4px">停留所間の平均時間（分）</div><input id="mi2" type="text" class="inp" value="'+e(S.mi)+'" style="margin-bottom:14px">'
    +'<button onclick="S.mn=document.getElementById(\'mn2\').value;S.ms=document.getElementById(\'ms2\').value;S.mt=document.getElementById(\'mt2\').value;S.mi=document.getElementById(\'mi2\').value;am()" class="btn" style="width:100%;padding:12px;background:linear-gradient(135deg,#059669,#0891b2);color:white;font-size:14px">✅ 設定する</button>';
    return;
  }

  // モニター画面
  if(!S.route){app.innerHTML="";return;}
  var p0=buses[0]?buses[0].pos:-1;
  var ri="";
  if(S.rid){
    var sa=S.lu?Math.round((Date.now()-S.lu)/1000):null;
    ri=S.re
      ?'<span style="color:#ef4444;font-size:10px">● RTエラー</span>'
      :sa!==null
        ?'<span style="color:#22c55e;font-size:10px;animation:pulse 2s infinite">● '+(sa<60?sa+"秒前":Math.round(sa/60)+"分前")+'</span>'
        :'<span style="color:#475569;font-size:10px">● 取得中</span>';
  }

  // ヘッダー
  html+='<div style="background:linear-gradient(180deg,#0f1f3d,#0a1628);padding:14px 14px 0;margin:-14px -14px 0;border-bottom:1px solid #0f1f3d">'
  +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'
  +'<span style="font-size:22px;animation:float 2.5s ease-in-out infinite">🚌</span>'
  +'<div style="flex:1">'
  +'<div style="font-size:15px;font-weight:700">バス接近通知</div>'
  +'<div style="font-size:11px;color:#334155;margin-top:2px;display:flex;gap:6px;align-items:center">'
  +'<span style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+e(S.route.name)+'</span>'
  +(!S.rid?'<span style="color:#94a3b8;font-size:10px">○ 時刻表ベース</span>':ri)
  +'</div></div>'
  +'<div style="font-size:22px;font-weight:800;color:#38bdf8">'+ft(S.now)+'</div>'
  +'</div>'

  // バス会社変更・バス停変更ボタン（ヘッダー内）
  +'<div style="display:flex;gap:6px;margin-bottom:12px">'
  +'<button onclick="goChangeCompany()" style="flex:1;padding:7px;background:rgba(255,255,255,0.05);border:1px solid #1e3a5f;border-radius:8px;color:#64748b;font-size:12px;cursor:pointer;font-family:inherit">🔄 バス会社を変更</button>'
  +'<button onclick="goChangeStop()" style="flex:1;padding:7px;background:rgba(255,255,255,0.05);border:1px solid #1e3a5f;border-radius:8px;color:#64748b;font-size:12px;cursor:pointer;font-family:inherit">🚏 バス停を変更</button>'
  +'</div>'
  +'</div>'
  +'<div style="height:14px"></div>';

  // リアルタイム非対応の場合の案内
  if(!S.rid){
    html+='<div style="background:#1e293b;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#94a3b8;border:1px solid #334155;display:flex;align-items:center;gap:8px">'
    +'<span>ℹ️</span>'
    +'<span>このバス会社はリアルタイムGPS非対応のため、<strong style="color:#e2e8f0">時刻表ベース</strong>でバス位置を推定しています</span>'
    +'</div>';
  }

  // 次のバスカード
  if(nx){
    var dl=nx.dl>0.5?'<div style="font-size:11px;color:#f97316;margin-top:3px">⚠️ '+Math.round(nx.dl)+'分遅れ</div>':nx.dl<-0.5?'<div style="font-size:11px;color:#22c55e;margin-top:3px">✓ '+Math.round(-nx.dl)+'分早め</div>':"";
    html+='<div style="background:'+(urg?"linear-gradient(135deg,#7f1d1d,#450a0a)":"linear-gradient(135deg,#0f2847,#0a1628)")+';border-radius:20px;padding:18px;border:1px solid '+(urg?"#ef4444":"#1e3a5f")+';margin-bottom:14px;animation:'+(urg?"urgent 1.5s infinite":"none")+'">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
    +'<div>'
    +'<div style="font-size:11px;color:'+(urg?"#f87171":"#475569")+';margin-bottom:4px">'+(urg?"⚡ もうすぐ！":"次のバスまで")+'</div>'
    +'<div><span style="font-size:48px;font-weight:900;color:'+(urg?"#fca5a5":"#f8fafc")+'">'+mins+'</span><span style="font-size:16px;color:'+(urg?"#f87171":"#64748b")+'" > 分</span></div>'
    +'<div style="font-size:12px;color:#475569;margin-top:3px">'+ft(nx.times[S.ti])+'着'+(nx.rt?' <span style="color:#22c55e;font-size:10px">GPS</span>':'')+'</div>'
    +dl+'</div>'
    +'<div style="text-align:right">'
    +'<div style="font-size:11px;color:#475569;margin-bottom:3px">乗車停留所</div>'
    +'<div style="font-size:14px;font-weight:700;color:'+(urg?"#fca5a5":"#38bdf8")+';max-width:120px;text-align:right;line-height:1.4">'+(S.route.stops[S.ti]?e(S.route.stops[S.ti].name):"")+'</div>'
    +'</div></div>'
    +'<div style="margin-top:12px;background:rgba(0,0,0,0.3);border-radius:5px;height:5px;overflow:hidden">'
    +'<div style="width:'+Math.max(3,(nx.pos/(S.route.stops.length-1))*100)+'%;height:100%;background:'+(urg?"linear-gradient(to right,#ef4444,#f97316)":"linear-gradient(to right,#22c55e,#38bdf8)")+';border-radius:5px;transition:width 0.8s ease"></div>'
    +'</div>'
    +'<div style="display:flex;justify-content:space-between;font-size:10px;color:#1e3a5f;margin-top:3px">'
    +'<span>'+(S.route.stops[0]?e(S.route.stops[0].name):"")+'</span>'
    +'<span>'+(S.route.stops[S.route.stops.length-1]?e(S.route.stops[S.route.stops.length-1].name):"")+'</span>'
    +'</div></div>';
  }else{
    html+='<div style="background:#111827;border-radius:20px;padding:22px;border:1px solid #1e293b;margin-bottom:14px;text-align:center">'
    +'<div style="font-size:28px;margin-bottom:8px">🌙</div>'
    +'<div style="font-size:14px;color:#475569">この時間帯の運行はありません</div>'
    +'</div>';
  }

  // タイムライン
  html+='<div style="background:#111827;border-radius:16px;padding:14px 12px;border:1px solid #1e293b;margin-bottom:14px">'
  +'<div style="font-size:11px;color:#334155;margin-bottom:10px;padding-left:6px;display:flex;justify-content:space-between">'
  +'<span>バスの現在位置'+(buses[0]&&buses[0].rt?' <span style="color:#22c55e">GPS</span>':' <span style="color:#475569">推定</span>')+'</span>'
  +(nai!==null&&S.route.stops[nai]?'<span style="color:#7c3aed;font-size:11px">🔔 '+e(S.route.stops[nai].name)+'</span>':"")
  +'</div>'
  +'<div style="position:relative;padding-left:10px">'
  +'<div style="position:absolute;left:18px;top:6px;bottom:6px;width:2px;background:#1e293b;border-radius:2px"></div>';
  if(p0>=0)html+='<div style="position:absolute;left:18px;top:6px;height:'+Math.min(p0,S.route.stops.length-1)/(S.route.stops.length-1)*100+'%;width:2px;background:linear-gradient(to bottom,#22c55e,#38bdf8);border-radius:2px;transition:height 0.8s ease"></div>';
  S.route.stops.forEach(function(s,i){
    var passed=i<p0-0.3,isTgt=i===S.ti,isNot=i===nai,isBus=Math.abs(i-p0)<0.7;
    var col=isBus?"#facc15":isTgt?"#38bdf8":isNot?"#a78bfa":passed?"#22c55e":"#1e3a5f";
    html+='<div style="display:flex;align-items:center;margin-bottom:'+(i<S.route.stops.length-1?"10px":"0")+';opacity:'+(passed&&!isTgt&&!isNot?"0.3":"1")+'">'
    +'<div style="width:14px;height:14px;border-radius:50%;background:'+col+';border:2px solid #0a1628;flex-shrink:0;z-index:1;box-shadow:'+(isBus||isTgt?"0 0 10px "+col:"none")+'"></div>'
    +'<div style="margin-left:12px;font-size:'+(isTgt?"14px":"12px")+';font-weight:'+(isTgt||isBus?"700":"400")+';color:'+(isBus?"#facc15":isTgt?"#38bdf8":isNot?"#a78bfa":passed?"#334155":"#94a3b8")+';display:flex;align-items:center;gap:5px;flex-wrap:wrap">'
    +e(s.name)
    +(isTgt?'<span style="background:#38bdf822;color:#38bdf8;border:1px solid #38bdf844;border-radius:5px;padding:1px 5px;font-size:10px">乗車</span>':"")
    +(isNot&&!isTgt?'<span style="background:#a78bfa22;color:#a78bfa;border:1px solid #a78bfa44;border-radius:5px;padding:1px 5px;font-size:10px">通知</span>':"")
    +(isBus?"🚌":"")
    +'</div></div>';
  });
  html+='</div></div>';

  // 設定ボタン
  html+='<button onclick="S.ss=!S.ss;render()" class="btn" style="width:100%;padding:11px;background:#111827;border:1px solid #1e293b;border-radius:12px;color:#475569;font-size:13px;margin-bottom:'+(S.ss?"0":"4px")+'">⚙️ 通知設定 '+(S.ss?"▲":"▼")+'</button>';

  if(S.ss){
    html+='<div style="margin-top:14px">'
    // 乗車停留所
    +'<div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:10px">🎯 乗車停留所</div>'
    +'<div style="display:flex;flex-direction:column;gap:5px">';
    S.route.stops.forEach(function(s,i){
      html+='<button onclick="S.ti='+i+';S.nids=[];sv({route:S.route,ti:'+i+',gurl:S.gurl,rid:S.rid,hasRT:S.hasRT,nm:S.nm,ns:S.ns,nm2:S.nm2});render()" style="padding:8px 12px;background:'+(S.ti===i?"#0ea5e922":"#0a1628")+';border:1px solid '+(S.ti===i?"#38bdf8":"#1e293b")+';border-radius:8px;color:'+(S.ti===i?"#38bdf8":"#64748b")+';text-align:left;font-size:13px;cursor:pointer;font-family:inherit">'
      +'<span style="opacity:0.4;margin-right:6px;font-size:10px">'+(i+1)+'</span>'+e(s.name)+'</button>';
    });
    html+='</div></div>';
    // 通知タイミング
    html+='<div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:10px">🔔 通知タイミング</div>'
    +'<div style="display:flex;background:#0a1628;border-radius:10px;padding:3px;margin-bottom:10px">'
    +'<button onclick="S.nm=\'stops\';render()" style="flex:1;padding:7px;border:none;border-radius:8px;background:'+(S.nm==="stops"?"#0ea5e9":"none")+';color:'+(S.nm==="stops"?"white":"#475569")+';font-size:12px;cursor:pointer;font-family:inherit">何つ前の停留所</button>'
    +'<button onclick="S.nm=\'minutes\';render()" style="flex:1;padding:7px;border:none;border-radius:8px;background:'+(S.nm==="minutes"?"#0ea5e9":"none")+';color:'+(S.nm==="minutes"?"white":"#475569")+';font-size:12px;cursor:pointer;font-family:inherit">何分前</button>'
    +'</div>';
    if(S.nm==="stops"){
      html+='<div style="display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-bottom:5px"><span>前の停留所数</span><span style="color:#38bdf8;font-weight:700">'+S.ns+'つ前</span></div>'
      +'<input type="range" min="1" max="'+Math.min(5,S.ti||5)+'" value="'+S.ns+'" onchange="S.ns=+this.value;render()" oninput="S.ns=+this.value;render()">'
      +'<div style="margin-top:8px;background:#0a1628;border-radius:8px;padding:7px 10px;font-size:12px;color:#475569">📍 <span style="color:#a78bfa">'+(S.route.stops[Math.max(0,S.ti-S.ns)]?e(S.route.stops[Math.max(0,S.ti-S.ns)].name):"")+'</span></div>';
    }else{
      html+='<div style="display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-bottom:5px"><span>到着前の分数</span><span style="color:#38bdf8;font-weight:700">'+S.nm2+'分前</span></div>'
      +'<input type="range" min="1" max="15" value="'+S.nm2+'" onchange="S.nm2=+this.value;render()" oninput="S.nm2=+this.value;render()">';
    }
    html+='</div>';
    html+='<button onclick="if(window.Notification)Notification.requestPermission()" class="btn" style="width:100%;padding:11px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:white;margin-bottom:8px">🔔 スマホ通知を許可する</button>';
    if(S.rid){
      html+='<button onclick="drt()" class="btn" style="width:100%;padding:11px;background:#0f2847;border:1px solid #1e3a5f;color:#38bdf8;margin-bottom:8px">🔃 位置情報を今すぐ更新</button>';
    }
    html+='</div>';
  }

  app.innerHTML=html;
}

// 起動
try{["buskuru","buskuru2","buskuru3","buskuru4","bk5","bk6"].forEach(function(k){localStorage.removeItem(k);});}catch(x){}
var cfg=lv();
if(cfg&&cfg.route){
  S.route=cfg.route;S.ti=cfg.ti||0;
  S.gurl=cfg.gurl||null;S.rid=cfg.rid||null;S.hasRT=cfg.hasRT||false;
  S.nm=cfg.nm||"stops";S.ns=cfg.ns||2;S.nm2=cfg.nm2||5;
  S.scr="monitor";
  if(S.rid)srt();
}
render();
</script>
</body>
</html>
